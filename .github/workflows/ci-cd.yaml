name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (Vitest)
        run: npm run test

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ketsia_shop_test
          MYSQL_USER: ketsia_user
          MYSQL_PASSWORD: ketsia_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u ketsia_user -pketsia_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      APP_SECRET: ci_secret
      DATABASE_URL: mysql://ketsia_user:ketsia_password@127.0.0.1:3306/ketsia_shop?serverVersion=8.0&charset=utf8mb4
      DEFAULT_URI: http://localhost:8000
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
      STRIPE_SECRET_KEY: sk_test_dummy_key_for_ci
      JWT_PASSPHRASE: change_me_to_a_secure_passphrase
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nécessaire pour l'analyse SonarCloud plus bas

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: ctype, iconv, intl, mbstring, pdo_mysql, zip
          coverage: xdebug  # active la couverture pour SonarCloud

      - name: Create .env file
        run: |
          cat > .env << EOF
          APP_ENV=${APP_ENV}
          APP_SECRET=${APP_SECRET}
          DATABASE_URL=${DATABASE_URL}
          DEFAULT_URI=${DEFAULT_URI}
          CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          JWT_PASSPHRASE=${JWT_PASSPHRASE}
          JWT_SECRET_KEY=${JWT_SECRET_KEY}
          JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
          EOF

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem -passout pass:$JWT_PASSPHRASE -aes256 4096
          openssl rsa -pubout -in config/jwt/private.pem -passin pass:$JWT_PASSPHRASE -out config/jwt/public.pem

      - name: PHP syntax check
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Prepare database
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests with coverage
        run: php bin/phpunit --testdox --coverage-clover=coverage.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # -----------------------
  # ANALYSE SONARCLOUD
  # (le SonarQube local ne peut pas être atteint par les runners GitHub)
  # -----------------------
  sonarqube:
    name: SonarCloud analysis
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [sonarqube]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate full stack build
        run: docker compose -f compose.yaml build

  # -----------------------
  # DEPLOIEMENT RENDER
  # Ne se déclenche que sur push main
  # A activer une fois le compte Render créé (retire le "false &&")
  # -----------------------
  deploy:
    name: Deploy to Render
    needs: [docker]
    runs-on: ubuntu-latest
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Déployer le backend sur Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Déployer le frontend sur Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

