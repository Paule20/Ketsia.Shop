name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

jobs:
  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ketsia_shop_test
          MYSQL_USER: ketsia_user
          MYSQL_PASSWORD: ketsia_password
          MYSQL_ROOT_PASSWORD: root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u ketsia_user -pketsia_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=6
    defaults:
      run:
        working-directory: backend
    env:
      APP_ENV: test
      APP_SECRET: ci_secret
      DATABASE_URL: mysql://ketsia_user:ketsia_password@127.0.0.1:3306/ketsia_shop?serverVersion=8.0&charset=utf8mb4
      JWT_PASSPHRASE: change_me_to_a_secure_passphrase
      JWT_SECRET_KEY: "%kernel.project_dir%/config/jwt/private.pem"
      JWT_PUBLIC_KEY: "%kernel.project_dir%/config/jwt/public.pem"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: ctype, iconv, intl, mbstring, pdo_mysql, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genrsa -out config/jwt/private.pem -passout pass:$JWT_PASSPHRASE -aes256 4096
          openssl rsa -pubout -in config/jwt/private.pem -passin pass:$JWT_PASSPHRASE -out config/jwt/public.pem

      - name: PHP syntax check
        run: find src tests -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Prepare database
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        run: php bin/phpunit --testdox

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate full stack build
        run: docker compose -f compose.yaml build
