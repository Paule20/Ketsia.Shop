# ============================================================
# Ketsia.shop — Stack Docker Backend
# ============================================================

services:

  # --- PHP-FPM + Symfony ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ketsia_backend
    volumes:
      - .:/var/www/backend
      - /var/www/backend/vendor
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://${DB_USER}:${DB_PASSWORD}@database:3306/${DB_NAME}?serverVersion=8.0&charset=utf8mb4
      JWT_SECRET_KEY: /var/www/backend/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/backend/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - ketsia_network
    restart: unless-stopped

  # --- Nginx ---
  nginx:
    image: nginx:1.25-alpine
    container_name: ketsia_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/backend:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ketsia_network
    restart: unless-stopped

  # --- MySQL ---
  database:
    image: mysql:8.0
    container_name: ketsia_database
    environment:
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ketsia_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ketsia_network
    restart: unless-stopped

  # --- phpMyAdmin ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ketsia_phpmyadmin
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - ketsia_network
    restart: unless-stopped

  # --- Frontend (a activer plus tard) ---
  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #   container_name: ketsia_frontend
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     VITE_API_URL: http://localhost:8000
  #   depends_on:
  #     - nginx
  #   networks:
  #     - ketsia_network

volumes:
  ketsia_mysql_data:
    driver: local

networks:
  ketsia_network:
    driver: bridge