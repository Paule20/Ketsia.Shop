security:
    # Algorithme de hashage des mots de passe (bcrypt, auto-upgrade possible)
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # Fournisseur d'utilisateurs : chargement par email depuis la BDD
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Toutes les routes /api/* : validation du token JWT, sans session
        # /api/login et /api/register sont publics via access_control
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        # Routes publiques (lecture catalogue)
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/products, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/categories, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/contact, roles: PUBLIC_ACCESS, methods: [POST] }

        # Routes admin : necessitent ROLE_ADMIN
        - { path: ^/api/admin, roles: ROLE_ADMIN }

        # Tout le reste /api/* : utilisateur connecte
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
