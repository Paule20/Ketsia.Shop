server {
    listen 80;
    server_name localhost;

    # Racine du projet Symfony (dossier public/)
    root /var/www/backend/public;
    index index.php;

    # Logs accessibles via docker logs
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Toutes les requetes sont redirigees vers index.php (front controller Symfony)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Passage des requetes PHP a PHP-FPM (service "backend" dans docker-compose)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Timeout etendu pour les requetes longues (ex: generation de fixtures)
        fastcgi_read_timeout 300;

        internal;
    }

    # Bloque l'acces direct aux autres fichiers .php (securite)
    location ~ \.php$ {
        return 404;
    }
}
