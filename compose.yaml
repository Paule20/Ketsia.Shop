name: ketsia-shop

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ketsia_backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DATABASE_URL: mysql://${DB_USER:-ketsia_user}:${DB_PASSWORD:-ketsia_password}@database:3306/${DB_NAME:-ketsia_shop}?serverVersion=8.0&charset=utf8mb4
      JWT_SECRET_KEY: /var/www/backend/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/backend/config/jwt/public.pem
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-change_me_to_a_secure_passphrase}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-ketsia_mongo}:${MONGO_INITDB_ROOT_PASSWORD:-ketsia_mongo_password}@mongo:27017/?authSource=admin
      MONGODB_DB: ${MONGO_DB_NAME:-ketsia_shop}
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    depends_on:
      database:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - ketsia_network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: ketsia_api
    ports:
      - "${API_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - ketsia_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: ketsia_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - nginx
    networks:
      - ketsia_network
    restart: unless-stopped

  database:
    image: mysql:8.0
    container_name: ketsia_database
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ketsia_shop}
      MYSQL_USER: ${DB_USER:-ketsia_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ketsia_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - ketsia_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-ketsia_user}", "-p${DB_PASSWORD:-ketsia_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ketsia_network
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: ketsia_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-ketsia_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-ketsia_mongo_password}
    ports:
      - "${MONGO_PORT:-27018}:27017"
    volumes:
      - ketsia_mongo_data:/data/db
    networks:
      - ketsia_network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ketsia_phpmyadmin
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${PMA_PORT:-8080}:80"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - ketsia_network
    restart: unless-stopped

volumes:
  backend_vendor:
  ketsia_mysql_data:
  ketsia_mongo_data:

networks:
  ketsia_network:
    driver: bridge
