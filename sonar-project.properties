# Configuration SonarCloud pour Ketsia Shop
sonar.organization=paule20
sonar.projectKey=Paule20_Ketsia.Shop
sonar.projectName=Ketsia Shop
sonar.projectVersion=1.0

# Dossiers analysés (frontend React + backend Symfony)
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/tests
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/*Test.php

# Exclusions (fichiers générés, dépendances, builds)
sonar.exclusions=**/node_modules/**,**/vendor/**,**/var/**,**/dist/**,**/build/**,**/*.min.js

# Rapports de couverture
sonar.php.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Encodage des sources
sonar.sourceEncoding=UTF-8
